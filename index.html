<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familiemad</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF7F2;--sf:#FFF;--sf2:#F3EFE8;--ac:#D4622A;--acs:#FAEADE;--gr:#3A6B3F;--grs:#E3EEE4;--tx:#1C1A17;--mu:#7A756C;--bd:rgba(28,26,23,0.1);--r:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.screen{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.screen.active{display:flex;flex-direction:column}
::-webkit-scrollbar{display:none}
.top-bar{padding:12px 20px 6px;background:var(--bg);position:sticky;top:0;z-index:10}
.top-bar h1{font-family:'Fraunces',serif;font-weight:300;font-size:24px;letter-spacing:-.5px}
.top-bar h1 em{font-style:italic;color:var(--ac)}
.top-bar p{font-size:12px;color:var(--mu);margin-top:1px}
.nav{flex-shrink:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;cursor:pointer;color:var(--mu);font-size:10px;font-family:'DM Sans',sans-serif}
.nb.active{color:var(--ac)}
.nb svg{width:22px;height:22px;stroke-width:1.6}
.card{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden}
.gbtn{display:flex;align-items:center;gap:6px;background:var(--ac);color:white;border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500}
.gbtn svg{width:14px;height:14px;stroke:white}
.bcard{margin:0 16px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px}
.bm{flex:1}.bl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ba{font-family:'Fraunces',serif;font-weight:300;font-size:24px}.ba em{font-style:italic;color:var(--ac)}
.bs{font-size:12px;color:var(--mu);margin-top:1px}.bb{flex:1;display:flex;flex-direction:column;gap:4px}
.br{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--mu)}
.br span:first-child{width:26px}.bbg{flex:1;height:4px;background:var(--sf2);border-radius:2px;overflow:hidden}
.bbf{height:100%;border-radius:2px;background:var(--ac)}.br .bkr{width:28px;text-align:right}
.dsw{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 6px}
.ds{display:flex;gap:6px}
.dp{width:33px;height:33px;border-radius:50%;border:1.5px solid var(--bd);background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--mu);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center}
.dp.active{background:var(--ac);color:white;border-color:var(--ac)}
.dr{display:grid;grid-template-columns:50px 1fr auto auto auto;align-items:center;padding:11px 16px;gap:6px;border-bottom:1px solid var(--bd)}
.dr:last-child{border-bottom:none}
.dl{font-size:11px;color:var(--mu);font-weight:500}.dt .dl{color:var(--ac)}
.mt{font-size:14px;line-height:1.3;cursor:pointer}.mp{font-size:12px;color:var(--gr);font-weight:500;white-space:nowrap}
.sb{background:none;border:none;cursor:pointer;color:var(--mu);padding:4px;border-radius:8px;display:flex;align-items:center}
.sb svg{width:15px;height:15px;stroke-width:2}
.em{color:var(--mu);font-style:italic;font-size:13px}
.star-btn{background:none;border:none;cursor:pointer;padding:3px;font-size:16px;line-height:1}
.lt{padding:0 16px 8px;display:flex;align-items:center;justify-content:space-between}
.lt h2{font-family:'Fraunces',serif;font-weight:300;font-size:20px}
.cb{font-size:13px;color:var(--mu);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.lar{display:flex;gap:8px;padding:0 16px 12px}
.lab{background:var(--ac);color:white;border:none;border-radius:12px;width:42px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alb{margin:10px 16px 0;display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 32px);background:var(--grs);color:var(--gr);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.syn{margin:10px 16px 0;background:var(--acs);border-radius:12px;padding:11px 14px;display:flex;gap:10px;align-items:flex-start}
.syn p{font-size:13px;color:var(--ac);line-height:1.5}
.share-bar{display:flex;gap:8px;padding:8px 16px 4px}
.share-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--sf2);border:none;border-radius:12px;padding:11px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--tx)}
.store-row{display:flex;gap:6px;padding:6px 16px 10px;flex-wrap:wrap}
.store-pill{background:none;border:1.5px solid var(--bd);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--mu);font-family:'DM Sans',sans-serif}
.store-pill.active{background:var(--ac);color:white;border-color:var(--ac)}
.lch{padding:12px 16px 4px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);display:flex;align-items:center;gap:6px}
.li{display:flex;flex-direction:column;padding:10px 16px;border-bottom:1px solid var(--bd)}
.li:last-child{border-bottom:none}
.lim{display:flex;align-items:center;gap:10px}
.lck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bd);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.li.done .lck{background:var(--gr);border-color:var(--gr)}
.li.done .lck::after{content:'';display:block;width:6px;height:10px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-2px)}
.li.done .in{text-decoration:line-through;color:var(--mu)}
.in{flex:1;font-size:14px}.iq{font-size:12px;color:var(--mu)}
.ip{font-size:12px;color:var(--gr);font-weight:500;white-space:nowrap}
.id{background:none;border:none;color:var(--mu);cursor:pointer;font-size:18px;padding:2px 4px;opacity:.5}
.iui{margin-left:32px;margin-top:3px;display:flex;flex-wrap:wrap;gap:4px}
.ut{font-size:11px;padding:2px 7px;border-radius:8px;background:var(--sf2);color:var(--mu)}
.ut.mx{background:var(--acs);color:var(--ac);font-weight:500}
.sd{width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-right:-2px}
.ltr{margin:8px 16px 16px;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;font-size:14px}
.filter-row{display:flex;gap:6px;padding:4px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.fpill{background:none;border:1.5px solid var(--bd);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--mu);font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.fpill.active{background:var(--tx);color:white;border-color:var(--tx)}
.fav-empty{padding:40px 20px;text-align:center;color:var(--mu);font-size:14px;line-height:1.6}
.mo{position:fixed;inset:0;background:rgba(28,26,23,.5);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.md{background:var(--sf);border-radius:24px 24px 0 0;width:100%;max-height:92dvh;overflow-y:auto;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));animation:su .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 16px}
.mc{padding:0 20px 20px}
.mc h2{font-family:'Fraunces',serif;font-weight:300;font-size:22px;margin-bottom:5px}
.mm{font-size:13px;color:var(--mu);margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap}
.mm .co{color:var(--gr);font-weight:500}
.ms{margin-bottom:18px}
.ms h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:8px;font-weight:500}
.il{list-style:none}
.il li{padding:8px 0;border-bottom:1px solid var(--bd);font-size:14px;display:flex;justify-content:space-between;align-items:center}
.il li:last-child{border-bottom:none}
.ir2{display:flex;gap:10px;align-items:center;color:var(--mu);font-size:13px}
.ipr{color:var(--gr);font-size:12px;font-weight:500}
.sl{list-style:none;counter-reset:st}
.sl li{counter-increment:st;padding:9px 0 9px 34px;border-bottom:1px solid var(--bd);font-size:14px;line-height:1.6;position:relative}
.sl li::before{content:counter(st);position:absolute;left:0;top:11px;width:22px;height:22px;background:var(--acs);color:var(--ac);font-size:11px;font-weight:500;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sl li:last-child{border-bottom:none}
.mbr{display:flex;gap:8px;margin-top:8px}
.mb{flex:1;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.mb.pr{background:var(--ac);color:white}.mb.se{background:var(--sf2);color:var(--tx)}.mb.ge{background:var(--grs);color:var(--gr)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
<div class="screen active" id="screen-plan">
  <div class="top-bar"><h1>Familie<em>mad</em></h1><p id="psub">5 dage · 4 pers</p></div>
  <div class="dsw"><div class="ds" id="ds"></div>
    <button class="gbtn" onclick="generatePlan()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Generer</button>
  </div>
  <div id="budget"></div>
  <div class="share-bar">
    <button class="share-btn" onclick="sharePlan()">📤 Del madplan</button>
    <button class="share-btn" onclick="copyPlan()">📋 Kopier</button>
  </div>
  <div style="padding:0 16px;margin-bottom:14px"><div class="card" id="plan-list"></div></div>
</div>
<div class="screen" id="screen-list">
  <div class="top-bar"><h1>Ind<em>køb</em></h1><p>Fra ugeplanen</p></div>
  <button class="alb" onclick="buildList()">✦ Generer fra ugeplan</button>
  <div id="syn-area"></div>
  <div style="padding:8px 16px 2px;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em">Butik</div>
  <div class="store-row" id="store-row"></div>
  <div class="lt"><h2>Min liste</h2><button class="cb" onclick="clearDone()">Ryd afkrydset</button></div>
  <div class="share-bar">
    <button class="share-btn" onclick="shareList()">📤 Send liste</button>
    <button class="share-btn" onclick="copyList()">📋 Kopier liste</button>
  </div>
  <div class="lar"><input id="list-input" style="flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:10px 14px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--tx);outline:none" placeholder="Tilsæt vare..." onkeydown="if(event.key==='Enter')addItem()"><button class="lab" onclick="addItem()">+</button></div>
  <div id="list-con" style="margin:0 16px"></div>
  <div id="list-tot"></div>
</div>
<div class="screen" id="screen-favs">
  <div class="top-bar"><h1>Favor<em>itter</em></h1><p>Dine gemte retter</p></div>
  <div class="filter-row" id="fav-filters"></div>
  <div id="fav-list" style="padding:0 16px"></div>
</div>
<nav class="nav">
  <button class="nb active" onclick="showS('plan',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>Madplan</button>
  <button class="nb" onclick="showS('list',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>Indkøb</button>
  <button class="nb" onclick="showS('favs',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Favoritter</button>
</nav>
</div>
<div class="mo" id="modal" onclick="closeMo(event)"><div class="md"><div class="mh"></div><div class="mc" id="mb"></div></div></div>
<div class="toast" id="toast"></div>

  bolognese:["Hak løg, hvidløg, gulerødder og selleri fint. Svits i olie 5 min.","Tilsæt hakket kød og brun grundigt — rør ikke for meget.","Rør tomatpuré i og steg 2 min. Deglacér med rødvin og lad fordampe.","Hæld passata i, krydr med salt, peber og sukker. Simre 15 min.","Kog spaghetti. Gem 1 dl kogevand. Bland pasta med sauce.","Riv parmesan over og server."],

  lasagne:["Forvarm ovn til 200°C. Skær grøntsager i tern og steg 8 min.","Lav bechamel: smelt smør, rør mel i, tilsæt mælk lidt ad gangen.","Skift lag: passata med grøntsager — plader — bechamel.","Gentag. Slut med bechamel og parmesan.","Bag 30-35 min til gylden og bobler."],
  mac:["Kog macaroni. Steg bacon sprødt.","Smelt smør, rør mel i og kog 2 min. Tilsæt mælk under omrøring.","Smelt cheddar i saucen. Rør sennep i.","Bland pasta og bacon i saucen.","Server straks eller drys rasp over og gratiner 10 min."],
  risotto:["Varm bouillon — hold varm.","Svits løg og hvidløg i smør 3 min. Tilsæt champignon 4 min.","Tilsæt ris og rør 2 min. Hæld vin i og lad absorbere.","Tilsæt bouillon én grydske ad gangen under omrøring, 18-20 min.","Rør koldt smør og parmesan i. Hvil 2 min."],
  kødboller:["Bland kød med æg, rasp, salt og peber. Form boller.","Brun boller 6 min. Tag ud.","Svits hvidløg og tilsæt tomater. Simre 10 min.","Kom kødboller tilbage og simre 8 min.","Kog spaghetti. Server med basilikum og parmesan."],
  kyllrodfrugt:["Forvarm ovn til 210°C.","Halver kartofler, skær gulerødder og løg groft. Læg i fad med olie og hvidvin.","Krydr kyllingelår og læg ovenpå med timian og hvidløg.","Pres citron over og bag 35-40 min.","Hvil 5 min inden servering."],
  tikka:["Mariner kylling i yoghurt og halvdelen af paste 10 min. Kog ris.","Svits løg 5 min. Tilsæt hvidløg og ingefær 1 min.","Tilsæt paste og steg 2 min.","Tilsæt kylling og brun 4-5 min. Tilsæt tomater og kokosmælk.","Simre 15 min. Server over ris."],
  wokbroccoli:["Kog ris. Rist cashewnødder på tør pande.","Bland soya, østerssauce, ingefær og hvidløg til sauce.","Wok kylling ved høj varme 3-4 min.","Tilsæt broccoli og wok 3 min.","Hæld sauce over, tilsæt sesamolie og cashews. Server over ris."],
  teriyaki:["Bland soya, mirin, sake og sukker til teriyakisauce.","Kog ris med edamame de sidste 5 min.","Steg kylling ved høj varme 4 min til gylden.","Hæld sauce over og lad karamellisere 1-2 min.","Anret over ris med agurk og sesamfrø."],
  thaigron:["Kog ris. Svits karrypaste 1-2 min til duften blomstrer.","Tilsæt kylling i tern og steg 4 min.","Hæld kokosmælk i. Tilsæt fiskesauce, palmesukker og bambusskud.","Simre 12 min. Tilsæt peberfrugt de sidste 3 min.","Smag til med lime. Server over ris."],
  honningsennep:["Forvarm ovn til 200°C. Rør honning, begge sennep og hvidløg til glasur.","Halver kartofler i fad med olie og krydr.","Gnid glasur ind i kyllingen og læg ovenpå kartofler med timian.","Bag 30-35 min. Hvil 5 min."],
  satay:["Kog ris. Skær kylling i strimler og mariner i soya og hvidløg.","Træk på spyd og steg 5-6 min.","Rør peanutbutter, kokosmælk, fiskesauce, palmesukker og lime til sauce — varm forsigtigt.","Server med ris og sataysauce."],
  burrito:["Kog ris. Krydr kylling og steg i tern 5-6 min.","Varm bønner med spidskommen.","Varm wraps 30 sek i mikroovn.","Fordel ris, bønner, kylling og ost. Tilsæt salsa og fold.","Grill evt. 1 min i tør pande."],
  pita:["Krydr kylling med paprika og oregano. Steg 5-6 min per side. Hvil 3 min.","Snit rødløg fint og halvér tomater.","Varm pitabrød og åbn forsigtigt.","Smør tzatziki indeni og fyld med salat, kylling, løg og tomater."],
  fajitas:["Skær kylling og peberfrugt i strimler, løg i halve ringe.","Krydr kylling og steg 4 min. Tilsæt løg og peberfrugt 3 min.","Mos avocado med lime og salt.","Server til selvsamling med guacamole og creme fraiche."],
  pulled:["Kog kylling i bouillon med løg 20 min.","Riv i strimler og bland med BBQ-sauce.","Snit kål og riv gulerødder. Bland med mayo og eddike til coleslaw.","Rist briocheboller i smør. Byg burgere."],
  laksgrill:["Forvarm ovn til 200°C. Kog kartofler 15 min.","Læg laks på folie med smør, citronskiver, dild og kapers.","Dryp hvidvin over og fold foliepakkerne tæt.","Bag 15-18 min. Server med kartofler."],
  torsk:["Kog kartofler 18 min. Tør torsken og krydr.","Steg i smør 3-4 min per side. Tag ud.","Hæld fløde i panden. Lad reducere 2 min.","Rør begge sennep og kapers i. Smag til. Server med dild."],
  fiskefrik:["Kog kartofler 18 min. Hak løg og dild.","Bland fiskefars med æg, mel, løg og dild. Krydr.","Form frikadeller og steg i smør 3-4 min per side.","Server med kartofler, ærter og remoulade."],
  padthai:["Udblød risnudler i koldt vand 30 min eller kogende vand 5 min.","Bland tamarind, fiskesauce, palmesukker og soya til sauce.","Steg rejer 2 min. Skub til side og scramble æg.","Tilsæt nudler og sauce. Wok 2 min. Vend bønnespirer i.","Anret med peanuts og limebåde."],
  rejerwok:["Kog nudler 4 min. Dræn og skyl koldt.","Wok grøntsager med ingefær og hvidløg 3 min.","Tilsæt rejer og wok 2 min.","Tilsæt nudler, soya, østerssauce og sesamolie. Rør 1 min.","Klem lime over og server straks."],
  frikadeller:["Kog kartofler 20 min. Hak løg fint.","Bland kød, æg, mel, mælk, løg og allehånde. Krydr.","Form frikadeller og steg 4-5 min per side.","Mos kartofler med smør og mælk. Server med rødkål."],
  kotelet:["Kog kartofler. Skær æbler og kog med smør og sukker 8 min.","Krydr koteletter og steg 4 min per side. Hvil 3 min.","Svits løg 5 min. Tilsæt sennep og fløde — kog 2 min.","Server med løgsauce, æblekompot og kartofler."],
  mørbrad:["Kog kartofler. Skær mørbrad i medallioner og steg 3 min per side. Tag ud.","Steg løg, hvidløg og champignon 5 min.","Deglacér med hvidvin. Tilsæt fløde og simre 4 min.","Kom kød tilbage og varm 2 min."],
  tacos:["Brun løg og hvidløg. Tilsæt kød og brun grundigt.","Rør krydderier i og steg 1 min. Tilsæt tomater og simre 8 min.","Mos avocado med salt og citron.","Varm tacoskaller 4 min i ovnen. Server til selvsamling."],
  chili:["Svits løg og hvidløg. Tilsæt kød og brun 6 min.","Rør krydderier i og steg 1 min.","Tilsæt tomater og bønner. Simre 20 min.","Rør mørk chokolade i — runder chilien af. Kog ris. Server."],
  hakkebøf:["Kog kartofler. Steg løgringe i smør 15 min til bløde og gyldne.","Form bøffer og steg 3-4 min per side. Hold varm.","Rør mel i panden, tilsæt bouillon og soya. Simre 5 min til sovs.","Server med karamelliserede løg, sovs og kartofler."],
  burger:["Steg løg i smør ved lav varme 15 min. Steg bacon sprødt.","Krydr bøffer og steg 3-4 min per side. Læg ost på de sidste 1 min.","Rist boller. Saml burger med karamelliserede løg og bacon."],
  medister:["Kog kartofler. Steg medisterpølse 10-12 min — vend jævnligt.","Svits løg i smør, rør mel i og kog 2 min.","Tilsæt mælk under omrøring til jævn sauce. Rør persille i.","Server med kartofler."],
  biksemad:["Kog kartofler 10 min og skær i tern.","Steg løg gyldne. Tilsæt kartofler og pølse.","Steg ved høj varme 10-12 min — rør sjældent.","Tilsæt worcestershiresauce. Steg spejlæg. Server."],
  bollekarry:["Kog ris. Bland kød med æg og mel. Form boller og brun 5 min.","Svits løg og karry 3 min. Rør mel i.","Tilsæt mælk til jævn sauce. Kom boller tilbage og simre 10 min."],
  dahl:["Svits løg, hvidløg og ingefær 5 min. Tilsæt krydderier 1 min.","Tilsæt linser, tomater og kokosmælk. Simre 20 min.","Rør spinat i. Smag til med salt og lime.","Varm naan. Server med yoghurt."],
  kikærte:["Svits løg og hvidløg 4 min. Tilsæt krydderier og harissa 1 min.","Tilsæt tomater, kokosmælk, kikærter og rosiner. Simre 15 min.","Hæld kogende bouillon over couscous — dæk 5 min.","Smag til og server over couscous."],
  pizza:["Forvarm ovn til 250°C. Bland passata med hvidløg og oregano.","Smør sauce på bundene. Fordel mozzarella og tomater.","Bag 8-12 min til gylden. Top med basilikum."],
  tærte:["Forvarm ovn til 200°C. Optø spinat og klem al væske ud.","Svits løg og hvidløg 3 min. Bland med spinat.","Pisk æg og fløde. Smudr feta i og bland med spinat.","Rul dej i tærteform. Drys pinjekerner over. Bag 25-28 min."],
  mexicansk:["Kog ris. Svits løg og tilsæt bønner og majs med tacokrydderi.","Simre 5 min. Mos avocado med lime til guacamole.","Anret ris med bønner, tomater og guacamole. Top med creme fraiche."],
  pandekager:["Pisk mel, æg og mælk til jævn dej. Lad hvile 10 min.","Steg tynde pandekager i smør.","Fyld med skinke og revet ost. Fold og server straks."],
  quesadilla:["Bland bønner med krydderi. Fordel bønner og ost på halvdelen af wrap. Fold.","Steg på tør pande 2 min per side til gylden.","Skær i trekanter. Server med creme fraiche og salsa."],
  gyoza:["Bland hakket kød, finthakket kål, ingefær og hvidløg. Krydr med soya og sesamolie.","Læg fyld på gyoza-skin. Fugt kanten og fold tæt.","Steg i oliefilm 2 min til gylden bund. Tilsæt ½ dl vand og dæk til 4 min.","Rør soya, riseddike og sesamolie til dipping sauce."],
  friedrice:["Kog ris dagen før — kolde ris steger bedst.","Steg kylling i tern 4-5 min. Steg gulerødder med ingefær 3 min.","Skub til side og scramble æg i midten.","Tilsæt ris, ærter og kylling. Rør ved høj varme 3 min. Hæld soya og sesamolie over."],
  ramen:["Kog æg 7 min til bløde. Pil og mariner i soya og vand 10 min.","Varm bouillon med ingefær og hvidløg. Rør miso og soya i.","Kog nudler. Steg bacon sprødt.","Anret nudler i bouillon med halverede æg, bacon og purløg."],
  bibimbap:["Kog ris. Brun hakket kød med soya og sesamolie 4 min.","Steg spinat 2 min. Steg gulerødder 2 min. Skær agurk.","Steg spejlæg.","Anret ris med alle toppings og gochujang. Bland ved bordet."],
  bulgogi:["Bland soya, sesamolie, hvidløg, ingefær, sukker og revet æble til marinade.","Mariner oksekød mindst 15 min.","Steg ved høj varme 3-4 min til karamelliseret.","Kog ris. Server med salat og agurk."],
  gapao:["Kog ris. Hak hvidløg og chili og steg 1 min.","Tilsæt kylling og steg 4-5 min. Rør fiskesauce, soya og østerssauce i.","Tag af varmen og rør thai basilikum i.","Steg spejlæg med sprøde kanter. Server over ris med æg på toppen."],
  laksa:["Udblød risnudler 5 min. Steg laksa paste 2 min.","Tilsæt bouillon og kokosmælk. Kog op.","Tilsæt kylling og kog 12 min. Smag til med fiskesauce og lime.","Anret nudler i skåle, hæld laksa over og top med bønnespirer."],
  yakitori:["Bland soya, mirin, sake og sukker. Kog ind til glasur.","Skær kylling og træk på spyd skiftevis med purløg.","Grill 5-6 min. Pensl med glasur de sidste 2 min.","Kog ris. Server med ekstra glasur."],
  tonkatsu:["Bank schnitzel flad. Krydr. Vend i mel, æg og panko.","Steg i rigeligt olie 3-4 min per side til dybt gylden.","Rør worcestershiresauce og ketchup til tonkatsu-sauce.","Server med ris og finthakket kål."],
  mabodofu:["Skær kartofler og gulerødder. Steg kylling i tern 4 min.","Tilsæt løg og gulerødder 3 min. Tilsæt kartofler og vand. Kog 12 min.","Bræk curry roux i stykker og rør i. Simre 5 min.","Kog ris. Server curry over ris."],
  kimchipasta:["Kog spaghetti. Steg bacon sprødt.","Hak kimchi groft og steg 3 min i baconsfedt. Tilsæt hvidløg og smør.","Bland pasta, kimchi og kogevand. Rør soya og sesamolie i.","Top med parmesan og bacon."],
  thainudler:["Udblød risnudler 15 min. Skær grøntsager i strimler.","Wok grøntsager ved høj varme 3 min. Tilsæt nudler og steg 2 min.","Tilsæt soya, østerssauce og ingefær. Smag til med lime.","Anret med peanuts."],
  banh:["Skær gulerødder i julienne. Bland med riseddike og sukker — sylt 10 min.","Steg svinekød med hoisinsauce 5-6 min.","Smør mayonnaise på flutes. Fyld med kød, syltet gulerod, agurk og koriander.","Spis straks mens brødet er sprødt."],
  hotdog:["Kog pølser i vand 5 min. Varm brød 2 min i ovnen.","Rør mayo, finthakket agurk og sennep til remoulade.","Anret og top med remoulade, ketchup og ristet løg."],
  fiskefilet:["Kog kartofler 18 min. Krydr fiskefileter.","Vend i mel, æg og panko. Steg i smør 3 min per side til gyldne.","Server med remoulade og citron."],
  schnitzels:["Kog kartofler. Skær i skiver og bland med mayo og purløg.","Bank schnitzel flad. Krydr og vend i mel, æg og panko.","Steg i smør 3 min per side til sprød. Server med kartoffelsalat og citron."],
  nachos:["Forvarm ovn til 200°C. Steg kylling i tern 5-6 min.","Fordel nachos på bageplade. Top med kylling og ost.","Bag 8-10 min til osten bobler. Top med salsa og guacamole."],
  tortillapizza:["Forvarm ovn til 220°C. Smør passata på tortillas med hvidløg og oregano.","Fordel mozzarella, topping og tomater. Bag 8-10 min.","Skær i stykker og server straks."],
  nudelwok:["Kog nudler 4 min. Skær gulerødder i strimler og steg 3 min.","Tilsæt majs og ærter 1 min. Skub til side og scramble æg.","Bland alt med soya og sesamolie. Server straks."],
  kyllingnuggets:["Skær kylling i stykker. Krydr mel med paprika og salt.","Vend kylling i mel, æg og panko. Steg 3-4 min per side til gyldne.","Bag kartoffelbåde 20 min ved 200°C. Server med dip."],
  wrapskinke:["Steg kylling og skær i strimler. Varm wraps 20 sek i mikroovn.","Smør creme fraiche på. Fordel kylling, ost, majs og salat.","Rul stramt og skær på midten."],
  ossobuco:["Krydr skankerne og brun på alle sider 5-6 min. Tag ud.","Svits løg, gulerødder, selleri og hvidløg 5 min.","Deglacér med hvidvin og lad fordampe halvt. Tilsæt tomater.","Læg skankerne tilbage. Simre tildækket 35-40 min.","Riv citronskal og bland med hakket hvidløg og persille til gremolata.","Lav risotto (se risotto-opskrift). Server ossobuco med risotto og gremolata."],
  saltimbocca:["Kog kartofler.","Læg et salvieblad på hver schnitzel og vikl to skiver parmaskinke om — fix med tandstik.","Steg i smør 2-3 min per side til gylden. Tag ud.","Deglacér panden med hvidvin og lad reducere halvt.","Rør koldt smør i saucen.","Server med kartofler og sauce."],
  cacciatora:["Krydr kyllingelår og brun 4-5 min per side. Tag ud.","Svits løg og hvidløg 3 min.","Deglacér med hvidvin og lad fordampe. Tilsæt tomater, oliven og kapers.","Læg kylling tilbage med rosmarin. Simre tildækket 30 min.","Smag til med salt og peber.","Server med ristet brød til at suge saucen op."],
  trufflepasta:["Kog pasta — gem kogevand.","Steg svampe ved høj varme 5-6 min til gyldne — ikke for mange ad gangen.","Svits hvidløg 1 min. Tilsæt fløde og simre 3 min.","Bland pasta med svampe og sauce — tilsæt kogevand til cremet konsistens.","Riv parmesan over og dryp trøffelolie i.","Top med persille og server straks."],
  amatriciana:["Kog rigatoni — gem kogevand.","Steg guanciale/bacon ved lav varme til fedtet smelter og det er sprødt. Tag ud.","Tilsæt chiliflager og hæld hvidvin i — lad fordampe.","Tilsæt tomater og simre 12 min. Krydr.","Bland pasta med sauce og lidt kogevand. Vend guanciale i.","Riv pecorino over — ingen parmesan i denne ret."],
  caprese:["Kog kartofler.","Krydr kylling og steg 5-6 min per side til gennembagt.","Halvér cherrytomater og steg 2 min i samme pande.","Læg mozzarella over kylling og lad smelte under låg 2 min.","Reducer balsamico i panden til sirupagtig glasur.","Anret med kartofler, tomater, basilikum og balsamicoglasur."],
  suppli:["Lav risotto og lad afkøle helt.","Blend med parmesan og æg til fast masse.","Form til æggestore boller med et stykke mozzarella i midten.","Vend i rasp og steg i rigeligt olie 3-4 min til dybt gyldne.","Lad dryppe af på køkkenrulle.","Server med tomatsauce til dipping."],
  gnocchisauce:["Rist pinjekerner på tør pande til gyldne.","Halvér cherrytomater og steg i smør 3 min til bløde.","Kog gnocchi i saltet vand til de flyder op — ca. 2 min. Dræn.","Bland gnocchi med pesto og tomater.","Riv parmesan over og drys pinjekerner på."],
  koteletsennep:["Kog ris.","Krydr koteletter og steg 4 min per side. Hold varm.","Svits hvidløg og timian 1 min i stegepanden.","Tilsæt sennep og fløde — simre 4 min til sauce.","Smag til med salt og peber.","Server koteletter med sennepssauce og ris."],
  forloren2:["Forvarm ovn til 200°C.","Bland kød med æg, mel, salt og peber. Form til aflangt brød.","Læg baconskiver over. Hæld bouillon i fadet.","Bag 30-35 min. Gem stegeskyen til sovs.","Kog kartofler og varm rødkål.","Lav sovs på stegeskyen med lidt mel. Server i skiver."],
  oksesteg:["Brun stegen grundigt på alle sider 6-8 min. Tag ud.","Svits løg og gulerødder 4 min. Rør tomatpuré i.","Deglacér med rødvin og lad fordampe halvt. Tilsæt bouillon og timian.","Læg stegen tilbage. Simre tildækket 35 min.","Kog kartofler. Reducer saucen og smag til.","Skær stegen i skiver og server med sauce og kartofler."],
  lammekotelet:["Krydr lammekoteletter med hvidløg, citron, salt og peber.","Kog kartofler.","Steg 3 min per side — rosa indeni.","Blend yoghurt med frisk mynte og salt til sauce.","Server med kartofler, yoghurtmyntesauce og grøn salat."],
  kyllingporre:["Kog kartofler.","Krydr kylling og steg 5-6 min per side. Tag ud.","Skær porre i skiver og steg 5 min i stegepanden.","Svits hvidløg 1 min. Deglacér med hvidvin og lad fordampe.","Tilsæt fløde og sennep — simre 4 min. Kom kylling tilbage.","Server med kartofler."],
  fiskovn:["Forvarm ovn til 200°C. Kog kartofler 15 min.","Smelt smør med hvidløg og citronsaft.","Læg fisk i ovnfast fad og hæld smørsauce over.","Top med kapers. Bag 14-16 min.","Hak persille og drys over.","Server med kartofler."],
  svinerevben:["Forvarm ovn til 190°C.","Krydr ribben med paprika, spidskommen, salt og peber.","Bag tildækket med folie 35 min. Afdæk og pensl med BBQ-sauce.","Bag 10 min mere til karamelliseret.","Skær kartofler i både og bag 25 min ved 200°C.","Bland kål og mayo til coleslaw. Server med kartoffelbåde."],
  fiskpinde:["Kog kartofler 18 min. Blancher ærter 2 min.","Skær torsk i fingre ca. 2x6 cm.","Krydr mel med salt og paprika. Vend fisk i mel, æg og panko.","Steg i rigeligt smør 2-3 min per side til gyldne.","Server med kartofler, ærter og remoulade."],
  spagsmiley2:["Forvarm ovn til 220°C.","Smør passata på pizzabundene med lidt oregano.","Fordel revet mozzarella, skinke og majs.","Bag 8-10 min til osten bobler.","Skær i stykker og server."],
  pastabolle:["Kog spaghetti i rigeligt saltet vand.","Smelt smør med presset hvidløg 1 min ved lav varme.","Dræn pasta og vend straks i smørret.","Riv parmesan over og krydr med sort peber.","Server straks — enkelt og lækkert."],
  kyllnuggets2:["Forvarm ovn til 200°C.","Skær søbatats i både. Vend i olie, salt og paprika. Bag 25 min.","Skær kylling i stykker. Vend i mel, æg og panko.","Steg i olie 3-4 min per side til gyldne og gennembagt.","Server nuggets med søde kartoffelbåde og ketchup."],
  ostetoast:["Pisk æg og mælk i en dyb tallerken.","Smør ost og skinke på 4 brødskiver. Læg de andre skiver ovenpå.","Vend sandwichene i æg-blandingen på begge sider.","Steg i smør 3 min per side til gylden og sprød.","Skær på skrå og server straks."],
  tantanmen:["Kog nudler efter pakken. Dræn.","Brun hakket kød med hvidløg og ingefær 4 min.","Rør tahini, soya og chiliflager i kødet.","Varm bouillon op og rør tahini-blandingen i.","Anret nudler i skåle og hæld bouillon over.","Top med purløg og ekstra chiliflager."],
  okonomiyaki:["Snit kål fint. Bland med mel, æg og lidt vand til tyk dej.","Varm olie i pande. Hæld halvdelen af dejen i og form rund.","Læg baconskiver ovenpå. Steg 4-5 min ved middel varme.","Vend forsigtigt og steg 4 min mere.","Dryp mayonnaise og worcestershiresauce over i zigzag.","Drys bonito flakes og purløg over."],
  mapo:["Kog ris.","Skær tofu i tern. Hak hvidløg og ingefær.","Brun hakket kød 3-4 min. Tilsæt hvidløg og ingefær 1 min.","Tilsæt doubanjiang og soya — steg 1 min.","Tilsæt tofu forsigtigt og varm 3 min. Rør sesamolie i.","Server over ris med hakket purløg."],
  vietnamesisk:["Udblød glasnudler 5 min i kogende vand. Dræn og afkøl.","Skær agurk og gulerødder i julienne.","Bland fiskesauce, limesaft, sukker og lidt chili til dressing.","Steg rejer 2 min til lyserøde.","Anret nudler, salat, grøntsager og rejer i bowle.","Dryp dressing over og top med mynte."],
  koreanskbowl:["Bland soya, sesamolie, sukker og hvidløg til marinade.","Mariner oksekød 10 min.","Steg ved høj varme 3-4 min til karamelliseret.","Kog ris. Skær agurk i tynde skiver.","Anret ris med oksekød, kimchi og agurk.","Drys sesamfrø over."]

var CATS = {"Kød & fisk":["kylling","oksekød","svinekød","hakket","laks","fisk","bacon","skinke","pølse","rejer","tun","torsk","sild","flæsk"],"Grøntsager":["løg","hvidløg","tomat","gulerod","gulerødder","broccoli","spinat","kartofler","peberfrugt","salat","squash","champignon","selleri","aubergine","zucchini","asparges","edamame","ærter","kål","purløg"],"Mejeri & æg":["mælk","ost","fløde","smør","æg","yoghurt","creme","mozzarella","parmesan","cheddar","feta"],"Tørvarer":["pasta","spaghetti","ris","mel","bouillon","dåse","passata","kokosmælk","olie","linser","couscous","rasp","nudler","panko","bønner"],"Brød & bagt":["brød","boller","pizza","bund","tortilla","wraps","pita","naan","bao","flute"],"Sauce & krydderier":["pesto","sovs","sauce","ketchup","sennep","karry","krydderi","soya","teriyaki","bbq","miso","harissa","gochujang","hoisin"],"Andet":[]};
var CICO = {"Kød & fisk":"🥩","Grøntsager":"🥦","Mejeri & æg":"🧀","Tørvarer":"🫙","Brød & bagt":"🍞","Sauce & krydderier":"🧴","Andet":"🛒"};
var DAYS = ["Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag","Søndag"];
var TODAY = (new Date().getDay()+6)%7;
var CUR_MONTH = new Date().getMonth();

var planDays=5, weekPlan=DAYS.map(function(d){return {day:d,meal:null};}), shopping=[], favs=[], mealHistory=[], selStore="Ingen", favFilter="Alle";

function lsSave(){try{localStorage.setItem("fm_d",planDays);localStorage.setItem("fm_w",JSON.stringify(weekPlan));localStorage.setItem("fm_s",JSON.stringify(shopping));localStorage.setItem("fm_f",JSON.stringify(favs));localStorage.setItem("fm_h",JSON.stringify(mealHistory));localStorage.setItem("fm_st",selStore);}catch(e){}}
function lsLoad(){try{var d=localStorage.getItem("fm_d");if(d)planDays=parseInt(d)||5;var w=localStorage.getItem("fm_w");if(w)weekPlan=JSON.parse(w);var s=localStorage.getItem("fm_s");if(s)shopping=JSON.parse(s);var f=localStorage.getItem("fm_f");if(f)favs=JSON.parse(f);var h=localStorage.getItem("fm_h");if(h)mealHistory=JSON.parse(h);var st=localStorage.getItem("fm_st");if(st)selStore=st;}catch(e){}}
var _saveT=null;
function save(){lsSave();if(_saveT)clearTimeout(_saveT);if(window.storage)_saveT=setTimeout(function(){try{Promise.all([window.storage.set("fm_d",String(planDays)),window.storage.set("fm_w",JSON.stringify(weekPlan)),window.storage.set("fm_s",JSON.stringify(shopping)),window.storage.set("fm_f",JSON.stringify(favs)),window.storage.set("fm_h",JSON.stringify(mealHistory)),window.storage.set("fm_st",selStore)]);}catch(e){}},1200);}
function boot(){lsLoad();renderAll();if(!window.storage)return;Promise.all([window.storage.get("fm_d").catch(function(){return null;}),window.storage.get("fm_w").catch(function(){return null;}),window.storage.get("fm_s").catch(function(){return null;}),window.storage.get("fm_f").catch(function(){return null;}),window.storage.get("fm_h").catch(function(){return null;}),window.storage.get("fm_st").catch(function(){return null;})]).then(function(r){if(r[0])planDays=parseInt(r[0].value)||5;if(r[1])weekPlan=JSON.parse(r[1].value);if(r[2])shopping=JSON.parse(r[2].value);if(r[3])favs=JSON.parse(r[3].value);if(r[4])mealHistory=JSON.parse(r[4].value);if(r[5])selStore=r[5].value;lsSave();renderAll();}).catch(function(){});}
function renderAll(){renderDS();renderPlan();renderList();renderFavs();renderStoreRow();}

function shuf(a){return[].concat(a).sort(function(){return Math.random()-.5;});}
function catOf(n){var l=n.toLowerCase();var keys=Object.keys(CATS);for(var i=0;i<keys.length;i++){var kw=CATS[keys[i]];for(var j=0;j<kw.length;j++){if(l.indexOf(kw[j])>=0)return keys[i];}}return"Andet";}
function showS(id,btn){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.querySelectorAll(".nb").forEach(function(b){b.classList.remove("active");});document.getElementById("screen-"+id).classList.add("active");btn.classList.add("active");}
function closeMo(e){if(e.target===document.getElementById("modal"))document.getElementById("modal").classList.remove("open");}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function isFav(n){return favs.indexOf(n)>=0;}
function toggleFav(name){if(isFav(name))favs=favs.filter(function(f){return f!==name;});else favs.push(name);save();renderFavs();}

function renderDS(){
  document.getElementById("ds").innerHTML=[2,3,4,5,6,7].map(function(n){return'<button class="dp '+(n===planDays?"active":"")+'" onclick="setDays('+n+')">'+n+"</button>";}).join("");
  document.getElementById("psub").textContent=planDays+" dage · 4 pers";
}
function setDays(n){planDays=n;renderDS();renderPlan();save();}
function renderPlan(){
  document.getElementById("plan-list").innerHTML=weekPlan.slice(0,planDays).map(function(item,i){
    return'<div class="dr '+(i===TODAY?"dt":"")+'"><span class="dl">'+item.day.slice(0,3).toUpperCase()+"</span>"+(item.meal?'<span class="mt" onclick="openMeal('+i+')">'+item.meal.n+'</span><span class="mp">⏱'+item.meal.t+"m · ~"+item.meal.c+'kr</span><button class="star-btn" onclick="toggleFav(\''+item.meal.n.replace(/'/g,"\\'")+'\')">'+(isFav(item.meal.n)?"⭐":"☆")+'</button><button class="sb" onclick="swapDay('+i+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg></button>':'<span class="em">Ikke planlagt</span><span></span><span></span><button class="sb" onclick="swapDay('+i+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>')+"</div>";
  }).join("");
  renderBudget();
}
function renderBudget(){
  var meals=weekPlan.slice(0,planDays).filter(function(d){return d.meal;});
  if(!meals.length){document.getElementById("budget").innerHTML="";return;}
  var total=meals.reduce(function(s,d){return s+(d.meal.c||0);},0);
  var max=Math.max.apply(null,meals.map(function(d){return d.meal.c||0;}));
  var bars=meals.map(function(d){return'<div class="br"><span>'+d.day.slice(0,3)+'</span><div class="bbg"><div class="bbf" style="width:'+Math.round((d.meal.c||0)/max*100)+'%"></div></div><span class="bkr">'+d.meal.c+"</span></div>";}).join("");
  document.getElementById("budget").innerHTML='<div class="bcard"><div class="bm"><div class="bl">Uge estimat</div><div class="ba">'+total+' <em>kr</em></div><div class="bs">~'+Math.round(total/4)+' kr per person</div></div><div class="bb">'+bars+"</div></div>";
}
function seasonalMeals(){return M.filter(function(m){return !m.mo||m.mo.indexOf(CUR_MONTH)>=0;});}
function generatePlan(){
  var pool=seasonalMeals();
  var recent=mealHistory.reduce(function(a,b){return a.concat(b);},[]);
  var favPool=pool.filter(function(m){return isFav(m.n);});
  var sh=shuf(pool),picked=[],usedSyn={},seenIds={};
  shuf(favPool).forEach(function(m){if(picked.length>=Math.min(2,planDays))return;if(recent.indexOf(m.n)<0&&!seenIds[m.id]){picked.push(m);seenIds[m.id]=1;(m.sy||[]).forEach(function(s){usedSyn[s]=1;});}});
  sh.forEach(function(m){
    if(picked.length>=planDays)return;
    if(seenIds[m.id])return;
    if(recent.slice(0,planDays*2).indexOf(m.n)>=0)return;
    var ov=(m.sy||[]).some(function(s){return usedSyn[s];});
    if(ov||Math.random()<0.4){picked.push(m);seenIds[m.id]=1;(m.sy||[]).forEach(function(s){usedSyn[s]=1;});}
  });
  sh.forEach(function(m){if(picked.length>=planDays)return;if(!seenIds[m.id]){picked.push(m);seenIds[m.id]=1;}});
  for(var i=0;i<planDays;i++)weekPlan[i]={day:DAYS[i],meal:picked[i]||null};
  mealHistory.unshift(picked.map(function(m){return m.n;}));
  if(mealHistory.length>4)mealHistory.pop();
  save();renderPlan();toast(planDays+" retter genereret ✦");
}
function swapDay(idx){
  var ex=weekPlan.slice(0,planDays).filter(function(d,i){return i!==idx&&weekPlan[i].meal;}).map(function(d){return d.meal.n;});
  var pool=seasonalMeals();
  var options=shuf(pool.filter(function(m){return m.n!==(weekPlan[idx]&&weekPlan[idx].meal?weekPlan[idx].meal.n:"")&&ex.indexOf(m.n)<0;}));
  if(options.length){weekPlan[idx]={day:DAYS[idx],meal:options[0]};save();renderPlan();toast(options[0].n);}
}
function parseQty(q){if(!q)return null;var s=q.toString().trim().toLowerCase();var mx=s.match(/^([0-9.,½¼¾]+)\s*([a-zæøå]*)/);if(!mx)return null;var num=parseFloat(mx[1].replace(",",".").replace("½",".5").replace("¼",".25").replace("¾",".75"));if(isNaN(num))return null;return{num:num,unit:mx[2]||"stk"};}
function fmtQty(num,unit){var r=num%1===0?num:Math.round(num*10)/10;return(unit&&unit!=="stk")?r+" "+unit:r+" stk";}
function openMeal(idx){
  var m=weekPlan[idx]&&weekPlan[idx].meal;if(!m)return;
  var steps=STEPS[m.id]||["Fremgangsmåde ikke tilgængelig."];
  var p=4;
  document.getElementById("mb").innerHTML="<h2>"+m.n+"</h2>"+'<div class="mm"><span>⏱ '+m.t+' min</span><span>👨‍👩‍👧‍👦 <span id="pv">4</span> pers</span><span class="co" id="prv">~'+m.c+' kr</span>'+(m.sy&&m.sy.length?'<span>✦ Deler råvarer</span>':"")+
  '</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--sf2);border-radius:12px;padding:10px 14px"><label style="font-size:13px;color:var(--mu);white-space:nowrap">Portioner</label><input type="range" min="1" max="10" value="4" style="flex:1;accent-color:var(--ac)" oninput="scaleMeal(this.value,'+idx+')"><span style="font-size:14px;font-weight:500;min-width:24px;text-align:right" id="pn">4</span></div>'+
  '<div class="ms"><h3>Ingredienser</h3><ul class="il" id="isc">'+m.i.map(function(x){return"<li><span>"+x.n+"</span><span class=\"ir2\"><span>"+x.q+"</span><span class=\"ipr\">~"+x.p+" kr</span></span></li>";}).join("")+"</ul></div>"+
  '<div class="ms"><h3>Fremgangsmåde</h3><ol class="sl">'+steps.map(function(s){return"<li>"+s+"</li>";}).join("")+"</ol></div>"+
  '<div class="mbr"><button class="mb se" onclick="document.getElementById(\'modal\').classList.remove(\'open\');swapDay('+idx+')">↺ Skift</button><button class="mb se" id="fav-btn" onclick="toggleFav(\''+m.n.replace(/'/g,"\\'")+'\')">'+(isFav(m.n)?"⭐ Favorit":"☆ Gem")+'</button><button class="mb ge" onclick="addToList('+idx+')">+ Indkøb</button></div>';
  document.getElementById("modal").classList.add("open");
}
function scaleMeal(val,idx){
  var m=weekPlan[idx]&&weekPlan[idx].meal;if(!m)return;
  var ratio=val/4;
  document.getElementById("pv").textContent=val;
  document.getElementById("pn").textContent=val;
  document.getElementById("prv").textContent="~"+Math.round(m.c*ratio)+" kr";
  document.getElementById("isc").innerHTML=m.i.map(function(x){var pq=parseQty(x.q);var nq=pq?fmtQty(Math.round(pq.num*ratio*10)/10,pq.unit):x.q;return"<li><span>"+x.n+"</span><span class=\"ir2\"><span>"+nq+"</span><span class=\"ipr\">~"+Math.round((x.p||0)*ratio)+" kr</span></span></li>";}).join("");
}
function planText(){
  var lines=["🍽 Min madplan:\n"];
  weekPlan.slice(0,planDays).forEach(function(d){if(d.meal)lines.push(d.day+": "+d.meal.n+" (⏱"+d.meal.t+"min, ~"+d.meal.c+"kr)");});
  var total=weekPlan.slice(0,planDays).filter(function(d){return d.meal;}).reduce(function(s,d){return s+(d.meal.c||0);},0);
  lines.push("\nTotal: ~"+total+" kr");
  return lines.join("\n");
}
function sharePlan(){if(navigator.share){navigator.share({title:"Min madplan",text:planText()}).catch(function(){});}else copyPlan();}
function copyPlan(){fallbackCopy(planText());}
function renderFavs(){
  var tags=[];
  M.filter(function(m){return favs.indexOf(m.n)>=0;}).forEach(function(m){(m.sy||[]).forEach(function(s){if(tags.indexOf(s)<0)tags.push(s);});});
  var labels={A:"Kylling",B:"Okse/svin",C:"Fisk",D:"Svinekød",E:"Pasta",F:"Asiatisk"};
  document.getElementById("fav-filters").innerHTML=["Alle"].concat(tags).map(function(t){return'<button class="fpill '+(favFilter===t?"active":"")+'" onclick="setFavFilter(\''+t+'\')">'+(t==="Alle"?"Alle":(labels[t]||t))+"</button>";}).join("");
  var filtered=M.filter(function(m){return favs.indexOf(m.n)>=0&&(favFilter==="Alle"||(m.sy||[]).indexOf(favFilter)>=0);});
  if(!filtered.length){document.getElementById("fav-list").innerHTML='<div class="fav-empty">Ingen favoritter endnu.<br>Tryk ☆ på en ret for at gemme den.</div>';return;}
  document.getElementById("fav-list").innerHTML=filtered.map(function(m){return'<div class="card" style="margin-bottom:10px;cursor:pointer" onclick="openFavMeal(\''+m.id+'\')"><div style="padding:12px 16px;display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:14px;font-weight:500">'+m.n+'</div><div style="font-size:12px;color:var(--mu);margin-top:2px">⏱ '+m.t+' min · ~'+m.c+' kr</div></div><button class="star-btn" onclick="event.stopPropagation();toggleFav(\''+m.n.replace(/'/g,"\\'")+'\')"  >⭐</button></div></div>';}).join("");
}
function setFavFilter(t){favFilter=t;renderFavs();}
function openFavMeal(id){
  var m=null;for(var i=0;i<M.length;i++){if(M[i].id===id){m=M[i];break;}}
  if(!m)return;
  var steps=STEPS[m.id]||["Fremgangsmåde ikke tilgængelig."];
  document.getElementById("mb").innerHTML="<h2>"+m.n+"</h2>"+'<div class="mm"><span>⏱ '+m.t+' min</span><span class="co">~'+m.c+' kr</span></div>'+
  '<div class="ms"><h3>Ingredienser</h3><ul class="il">'+m.i.map(function(x){return"<li><span>"+x.n+"</span><span class=\"ir2\"><span>"+x.q+"</span><span class=\"ipr\">~"+x.p+" kr</span></span></li>";}).join("")+"</ul></div>"+
  '<div class="ms"><h3>Fremgangsmåde</h3><ol class="sl">'+steps.map(function(s){return"<li>"+s+"</li>";}).join("")+"</ol></div>"+
  '<div class="mbr"><button class="mb se" onclick="toggleFav(\''+m.n.replace(/'/g,"\\'")+'\')" >⭐ Fjern favorit</button></div>';
  document.getElementById("modal").classList.add("open");
}
function renderStoreRow(){document.getElementById("store-row").innerHTML=Object.keys(STORES).map(function(s){return'<button class="store-pill '+(s===selStore?"active":"")+'" onclick="setStore(\''+s+'\')">'+s+"</button>";}).join("");}
function setStore(s){selStore=s;save();renderList();}
function listText(){
  var undone=shopping.filter(function(i){return !i.done;});if(!undone.length)return"";
  var order=STORES[selStore]||STORES["Ingen"];
  var byCat={};
  undone.forEach(function(item){var c=item.category||catOf(item.name);if(!byCat[c])byCat[c]=[];byCat[c].push(item);});
  var sorted=Object.keys(byCat).sort(function(a,b){return(order.indexOf(a)+1||99)-(order.indexOf(b)+1||99);});
  var lines=["🛒 Indkøbsliste:\n"];
  sorted.forEach(function(cat){lines.push("\n"+(CICO[cat]||"•")+" "+cat);byCat[cat].forEach(function(i){lines.push("  • "+i.name+(i.qty?" — "+i.qty:"")+(i.price?" (~"+i.price+"kr)":""));});});
  var total=undone.filter(function(i){return i.price;}).reduce(function(s,i){return s+(i.price||0);},0);
  if(total)lines.push("\nEstimeret total: ~"+total+" kr");
  return lines.join("\n");
}
function shareList(){var txt=listText();if(!txt){toast("Listen er tom");return;}if(navigator.share){navigator.share({title:"Indkøbsliste",text:txt}).catch(function(){return fallbackCopy(txt);});}else fallbackCopy(txt);}
function copyList(){var txt=listText();if(!txt){toast("Listen er tom");return;}fallbackCopy(txt);}
function fallbackCopy(txt){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){toast("Kopieret!");}).catch(function(){execCopy(txt);});}else execCopy(txt);}
function execCopy(txt){var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");toast("Kopieret!");}catch(e){toast("Kunne ikke kopiere");}document.body.removeChild(ta);}
function buildList(){
  var meals=weekPlan.slice(0,planDays).filter(function(d){return d.meal;});
  if(!meals.length){toast("Generer en madplan først");return;}
  var kept=shopping.filter(function(i){return !i._auto;});
  var map={};
  meals.forEach(function(d){d.meal.i.forEach(function(x){var k=x.n.toLowerCase();if(!map[k]){map[k]={name:x.n,qty:x.q,price:x.p||0,usedIn:[],category:catOf(x.n),_auto:true,_parsed:parseQty(x.q)};}else{var ep=map[k]._parsed,ip=parseQty(x.q);if(ep&&ip&&ep.unit===ip.unit){ep.num+=ip.num;map[k].qty=fmtQty(ep.num,ep.unit);}if(x.p)map[k].price=(map[k].price||0)+x.p;}if(map[k].usedIn.indexOf(d.meal.n)<0)map[k].usedIn.push(d.meal.n);});});
  Object.keys(map).forEach(function(k){var x=map[k];if(!kept.filter(function(s){return s.name.toLowerCase()===x.name.toLowerCase();}).length)kept.push({id:Date.now()+Math.random(),name:x.name,qty:x.qty,price:x.price||null,done:false,category:x.category,usedIn:x.usedIn,_auto:true});});
  shopping=kept;renderList();save();
  var multi=Object.keys(map).filter(function(k){return map[k].usedIn.length>1;}).length;
  toast(Object.keys(map).length+" varer · "+multi+" deles");
}
function renderList(){
  var el=document.getElementById("list-con");
  if(!shopping.length){el.innerHTML='<div style="padding:24px;text-align:center;color:var(--mu);font-size:14px">Tom liste</div>';document.getElementById("list-tot").innerHTML="";document.getElementById("syn-area").innerHTML="";return;}
  var undone=shopping.filter(function(i){return !i.done;}),done=shopping.filter(function(i){return i.done;});
  var multi=undone.filter(function(i){return i.usedIn&&i.usedIn.length>1;});
  document.getElementById("syn-area").innerHTML=multi.length?'<div class="syn"><span>✦</span><p><strong>'+multi.length+' varer bruges i flere retter</strong> — '+multi.slice(0,3).map(function(i){return i.name;}).join(", ")+".</p></div>":"";
  var order=STORES[selStore]||STORES["Ingen"];
  var byCat={};
  undone.forEach(function(item){var c=item.category||catOf(item.name);if(!byCat[c])byCat[c]=[];byCat[c].push(item);});
  var sorted=Object.keys(byCat).sort(function(a,b){return(order.indexOf(a)+1||99)-(order.indexOf(b)+1||99);});
  function ri(item){var isM=item.usedIn&&item.usedIn.length>1;return'<div class="li '+(item.done?"done":"")+'" id="li-'+item.id+'"><div class="lim">'+(isM?'<div class="sd"></div>':"")+
  '<div class="lck" onclick="tog(\''+item.id+'\')"></div><span class="in">'+item.name+'</span><span class="iq">'+(item.qty||"")+"</span>"+(item.price?'<span class="ip">~'+item.price+"kr</span>":"")+
  '<button class="id" onclick="del(\''+item.id+'\')">×</button></div>'+
  ((!item.done&&item.usedIn&&item.usedIn.length)?'<div class="iui">'+item.usedIn.map(function(r){return'<span class="ut '+(isM?"mx":"")+'">'+(r)+"</span>";}).join("")+"</div>":"")+"</div>";}
  var html=sorted.map(function(cat){return'<div class="card" style="margin-bottom:10px"><div class="lch"><span>'+(CICO[cat]||"🛒")+"</span>"+cat+"</div>"+byCat[cat].map(ri).join("")+"</div>";}).join("");
  if(done.length)html+='<div class="card" style="margin-bottom:10px;opacity:.7"><div class="lch">✓ Afkrydset ('+done.length+")</div>"+done.map(ri).join("")+"</div>";
  el.innerHTML=html;
  var priced=shopping.filter(function(i){return !i.done&&i.price;});
  document.getElementById("list-tot").innerHTML=priced.length?'<div class="ltr"><strong>Estimeret total</strong><strong>~'+priced.reduce(function(s,i){return s+(i.price||0);},0)+" kr</strong></div>":"";
}
function addItem(){var v=document.getElementById("list-input").value.trim();if(v){shopping.push({id:Date.now(),name:v,qty:"",price:null,done:false,category:catOf(v),usedIn:[]});document.getElementById("list-input").value="";renderList();save();}}
function tog(id){var it=shopping.filter(function(i){return String(i.id)===String(id);})[0];if(it){it.done=!it.done;renderList();save();}}
function del(id){shopping=shopping.filter(function(i){return String(i.id)!==String(id);});renderList();save();}
function clearDone(){shopping=shopping.filter(function(i){return !i.done;});renderList();save();toast("Afkrydsede varer fjernet");}
function addToList(idx){
  var meal=weekPlan[idx]&&weekPlan[idx].meal;if(!meal)return;
  meal.i.forEach(function(x){var ex=shopping.filter(function(s){return s.name.toLowerCase()===x.n.toLowerCase();})[0];if(ex){if(!ex.usedIn)ex.usedIn=[];if(ex.usedIn.indexOf(meal.n)<0)ex.usedIn.push(meal.n);}else shopping.push({id:Date.now()+Math.random(),name:x.n,qty:x.q,price:x.p||null,done:false,category:catOf(x.n),usedIn:[meal.n]});});
  renderList();save();document.getElementById("modal").classList.remove("open");toast("Ingredienser tilføjet");
}
boot();
</script>
